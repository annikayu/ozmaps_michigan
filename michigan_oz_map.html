<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-Frame-Options" content="ALLOWALL"/>
  <title>Michigan Opportunity Zones: 2017–2023 Change</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }

    /* ── Layout ── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* ── Header ── */
    #header {
      background: #f8f6f1;
      color: #1a1a1a;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      z-index: 1000;
      border-bottom: 2px solid #d4c9b0;
      flex-shrink: 0;
    }
    #header-text h1 { font-size: 0.95rem; font-weight: 700; color: #7b4f12; }
    #header-text p  { font-size: 0.7rem; color: #666; margin-top: 1px; }

    /* ── Metric tabs ── */
    #metric-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
    .mbtn {
      padding: 5px 13px;
      border: 2px solid #b8a98a;
      border-radius: 20px;
      background: transparent;
      color: #555;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .mbtn:hover  { border-color: #7b4f12; color: #7b4f12; }
    .mbtn.active { background: #7b4f12; border-color: #7b4f12; color: #fff; font-weight: 700; }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Legend ── */
    #legend {
      position: absolute;
      bottom: 30px; right: 10px;
      background: rgba(255,253,248,0.96);
      color: #222;
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 1000;
      min-width: 200px;
      font-size: 0.75rem;
      border: 1px solid #c8b89a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    #legend h4 { font-size: 0.78rem; color: #7b4f12; margin-bottom: 7px; }
    #legend-bar { height: 13px; border-radius: 4px; margin-bottom: 4px; }
    #legend-labels { display: flex; justify-content: space-between; color: #555; }
    .legend-na { margin-top: 8px; display: flex; align-items: center; gap: 6px; color: #888; }
    .na-box { width: 13px; height: 13px; background: #ccc; border-radius: 2px; flex-shrink: 0; }
    #legend-note { margin-top: 6px; color: #888; font-size: 0.68rem; line-height: 1.3; }

    /* ── Hover info panel ── */
    #info {
      position: absolute;
      bottom: 30px; left: 10px;
      background: rgba(255,253,248,0.96);
      color: #222;
      padding: 10px 14px;
      border-radius: 8px;
      z-index: 1000;
      width: 240px;
      font-size: 0.76rem;
      border: 1px solid #c8b89a;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }
    #info.show { opacity: 1; }
    #info h4 { font-size: 0.8rem; color: #7b4f12; margin-bottom: 7px; }
    .irow { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #e0d5c0; }
    .irow:last-child { border: none; }
    .ilbl { color: #666; }
    .ival { font-weight: 600; }
    .pos { color: #16803c; } .neg { color: #b91c1c; } .neu { color: #854d0e; }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: rgba(255,253,248,0.98) !important;
      color: #222 !important;
      border: 1px solid #c8b89a !important;
      border-radius: 8px !important;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-content { margin: 12px 14px !important; }
    .pu-title { font-weight: 700; color: #7b4f12; margin-bottom: 10px; font-size: 0.85rem; }
    .pu-section { margin-bottom: 9px; }
    .pu-metric-label { font-size: 0.68rem; color: #777; text-transform: uppercase; letter-spacing: 0.04em; }
    .pu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px 10px; font-size: 0.76rem; margin-top: 2px; }
    .pu-lbl { color: #666; }
    .pu-val { font-weight: 600; }
  </style>
</head>

};
function lerp(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return a.map((c, i) => Math.round(c + (b[i]-c)*t));
}
function rgb(c) { return `rgb(${c[0]},${c[1]},${c[2]})`; }

function getColor(val, mKey) {
  if (val == null) return '#cccccc';
  const cfg = M[mKey];
  const [lo, hi] = cfg.range;
  // Normalize to [-1, +1]
  const t = val <= 0
    ? Math.max(-1, val / Math.abs(lo))
    : Math.min(1,  val / hi);
  let c;
  if (cfg.invert) {
    // negative → good → green, positive → bad → red
    c = t < 0 ? lerp(COLORS.WHITE, COLORS.GREEN, -t)
              : lerp(COLORS.WHITE, COLORS.RED,    t);
  } else {
    // positive → good → green, negative → bad → red
    c = t > 0 ? lerp(COLORS.WHITE, COLORS.GREEN, t)
              : lerp(COLORS.WHITE, COLORS.RED,   -t);
  }
  return rgb(c);
}

function valueClass(val, mKey) {
  if (val == null) return '';
  const cfg = M[mKey];
  if (cfg.invert) return val < 0 ? 'pos' : val > 0 ? 'neg' : 'neu';
  else            return val > 0 ? 'pos' : val < 0 ? 'neg' : 'neu';
}

// ── Leaflet map ───────────────────────────────────────────────────────────────
// Bounding box for contiguous USA + Michigan buffer
const US_BOUNDS = L.latLngBounds(
  L.latLng(24.0, -127.0),   // SW corner
  L.latLng(50.5, -65.0)     // NE corner
);
const map = L.map('map', {
  center: [44.5, -85.5],
  zoom: 7,
  minZoom: 5,
  maxZoom: 16,
  maxBounds: US_BOUNDS,
  maxBoundsViscosity: 1.0,
  zoomControl: true,
});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a> | ACS 5-yr estimates, U.S. Census Bureau',
  maxZoom: 19
}).addTo(map);

let current = 'pov';
let ozLayer = null;

function style(feat) {
  const val = feat.properties[M[current].field];
  return {
    fillColor:   getColor(val, current),
    fillOpacity: val != null ? 0.78 : 0.2,
    color:       '#888888',
    weight:      0.6,
    opacity:     0.9,
  };
}

function onEach(feat, layer) {
  layer.on({
    mouseover(e) {
      e.target.setStyle({ weight: 2.5, color: '#7b4f12', fillOpacity: 0.95 });
      e.target.bringToFront();
      showInfo(feat.properties);
    },
    mouseout(e) {
      ozLayer.resetStyle(e.target);
      document.getElementById('info').classList.remove('show');
    },
    click(e) {
      showPopup(feat.properties, e.latlng);
    },
  });
}

function renderMap() {
  if (ozLayer) map.removeLayer(ozLayer);
  ozLayer = L.geoJSON(OZ_DATA, { style, onEachFeature: onEach }).addTo(map);
  updateLegend();
}

// ── Info panel ────────────────────────────────────────────────────────────────
function showInfo(p) {
  const cfg = M[current];
  const val = p[cfg.field];
  const cls = valueClass(val, current);
  const panel = document.getElementById('info');

  document.getElementById('info-title').textContent = `Tract ${p.GEOID}`;

  const extraRows = cfg.rows(p).map(([lbl, v]) =>
    `<div class="irow"><span class="ilbl">${lbl}</span><span class="ival">${v}</span></div>`
  ).join('');

  document.getElementById('info-body').innerHTML =
    `<div class="irow">
       <span class="ilbl">${cfg.label} Change</span>
       <span class="ival ${cls}">${cfg.fmt(val)}</span>
     </div>` + extraRows;

  panel.classList.add('show');
}

// ── Popup (click) ─────────────────────────────────────────────────────────────
function showPopup(p, latlng) {
  const sections = Object.entries(M).map(([key, cfg]) => {
    const val  = p[cfg.field];
    const cls  = valueClass(val, key);
    const rows = cfg.rows(p).map(([lbl, v]) =>
      `<span class="pu-lbl">${lbl}</span><span class="pu-val">${v}</span>`
    ).join('');
    return `
      <div class="pu-section">
        <div class="pu-metric-label">${cfg.label}</div>
        <div class="pu-grid">
          <span class="pu-lbl">Change</span>
          <span class="pu-val ${cls}">${cfg.fmt(val)}</span>
          ${rows}
        </div>
      </div>`;
  }).join('');

  L.popup({ maxWidth: 290, closeButton: true })
    .setLatLng(latlng)
    .setContent(`<div class="pu-title">Census Tract ${p.GEOID}</div>${sections}`)
    .openOn(map);
}

// ── Legend ────────────────────────────────────────────────────────────────────
function updateLegend() {
  const cfg = M[current];
  const [lo, hi] = cfg.range;
  document.getElementById('leg-title').textContent = `${cfg.label} Change (${cfg.unit})`;
  document.getElementById('leg-lo').textContent = (lo > 0 ? '+' : '') + lo + cfg.unit;
  document.getElementById('leg-hi').textContent = '+' + hi + cfg.unit;

  const stops = Array.from({ length: 24 }, (_, i) => {
    const val = lo + (hi - lo) * (i / 23);
    return getColor(val, current);
  });
  document.getElementById('legend-bar').style.background =
    `linear-gradient(to right, ${stops.join(',')})`;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
document.querySelectorAll('.mbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    current = btn.dataset.m;
    renderMap();
  });
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderMap();
</script>
</body>
</html>
